appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000
- tapOn:
    id: "session-card-test-session-1"
- tapOn:
    id: "input-attach-button"
- extendedWaitUntil:
    visible:
      id: "test-attachment-menu"
    timeout: 3000
- tapOn:
    id: "test-attachment-camera-denied"
- assertVisible:
    id: "input-attachment-status"
- assertVisible: "Camera Access Required"
- tapOn:
    id: "input-attach-button"
- tapOn:
    id: "test-attachment-library"
- assertVisible:
    id: "input-attachment-count"
- assertVisible: "2 attachments selected"
- tapOn:
    id: "input-text"
- inputText: "Describe attachments"
- tapOn:
    id: "input-send-button"
- extendedWaitUntil:
    visible: "Mock response to: Describe attachments with 2 attachments"
    timeout: 3000
- assertNotVisible:
    id: "input-attachment-preview-strip"
