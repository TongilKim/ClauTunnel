appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000
- tapOn:
    id: "session-card-test-session-1"

# Open command picker
- tapOn:
    id: "input-commands-button"
- extendedWaitUntil:
    visible:
      id: "command-picker-modal"
    timeout: 3000

# Search for nonexistent command
- tapOn:
    id: "command-search-input"
- inputText: "xyznonexistent"
- assertVisible: "No matching commands"

# Clear and verify commands come back
- clearText
- assertVisible:
    id: "command-option-model"

- tapOn:
    id: "session-back-button"
