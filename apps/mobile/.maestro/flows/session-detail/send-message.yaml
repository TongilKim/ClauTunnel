appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000
- tapOn:
    id: "session-card-test-session-1"
- tapOn:
    id: "input-text"
- inputText: "Hello from Maestro test"
- assertVisible:
    id: "input-send-button"
- tapOn:
    id: "input-send-button"
- extendedWaitUntil:
    visible: "Mock response to: Hello from Maestro test"
    timeout: 3000
- tapOn:
    id: "session-back-button"
