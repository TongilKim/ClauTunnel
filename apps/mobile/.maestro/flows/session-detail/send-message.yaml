appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000
- tapOn:
    id: "session-card-test-session-1"
- tapOn:
    id: "input-text"
- inputText: "Hello from Maestro test"
- assertVisible:
    id: "input-send-button"
- tapOn:
    id: "input-send-button"
- extendedWaitUntil:
    visible:
      id: "user-message-bubble-4"
    timeout: 3000
- assertVisible: "Hello from Maestro test"
- extendedWaitUntil:
    visible: "Mock response to: Hello from Maestro test"
    timeout: 3000
- tapOn:
    id: "session-back-button"
