appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000
- tapOn:
    id: "session-card-test-session-1"
- extendedWaitUntil:
    visible:
      id: "input-text"
    timeout: 3000

# Verify placeholder text
- assertVisible: "Message Claude..."

# Tap send button with empty input - should not send
- tapOn:
    id: "input-send-button"

# Verify no new messages appear (mock messages still the same)
- assertVisible: "Hello! How can I help you today?"

# Type spaces only and try to send
- tapOn:
    id: "input-text"
- inputText: "   "
- tapOn:
    id: "input-send-button"

# Verify still no new messages sent
- assertVisible: "Hello! How can I help you today?"

- tapOn:
    id: "session-back-button"
