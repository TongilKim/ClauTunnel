appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000

# Navigate to session detail
- tapOn:
    id: "session-card-test-session-1"
- extendedWaitUntil:
    visible:
      id: "session-title"
    timeout: 3000

# Tap title to edit
- tapOn:
    id: "session-title"
- extendedWaitUntil:
    visible: "Rename Session"
    timeout: 3000

# Enter very long title
- clearText
- inputText: "This is a very long session title that should be truncated with ellipsis in the header bar"
- tapOn: "Save"

# Verify title is updated (partial match since it will be truncated)
- extendedWaitUntil:
    visible: "This is a very long session title"
    timeout: 3000

# Go back and verify on session list
- tapOn:
    id: "session-back-button"
- extendedWaitUntil:
    visible: "This is a very long session title"
    timeout: 3000
