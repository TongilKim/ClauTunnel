appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000

# Navigate to session detail
- tapOn:
    id: "session-card-test-session-1"
- extendedWaitUntil:
    visible:
      id: "input-text"
    timeout: 3000

# Send a message
- tapOn:
    id: "input-text"
- inputText: "Tell me a long story"
- tapOn:
    id: "input-send-button"

# Verify user message bubble is rendered
- extendedWaitUntil:
    visible:
      id: "user-message-bubble-2"
    timeout: 3000
- assertVisible: "Tell me a long story"

# Tap stop button to cancel (should appear while typing)
- tapOn:
    id: "input-stop-button"
  optional: true

# Verify send button is back (not typing anymore)
- extendedWaitUntil:
    visible:
      id: "input-text"
    timeout: 3000

# Go back
- tapOn:
    id: "session-back-button"
