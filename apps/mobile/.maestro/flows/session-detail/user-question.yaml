appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000
- tapOn:
    id: "session-card-test-session-1"
- tapOn:
    id: "test-mode-toggle"
- tapOn:
    id: "test-mode-trigger-question"
- assertVisible:
    id: "user-question-modal"
- assertVisible: "Claude is asking..."
- assertVisible: "Which testing framework should we use?"
- tapOn:
    id: "user-question-option-0-0"
- tapOn:
    id: "user-question-submit"
- assertNotVisible:
    id: "user-question-modal"
- assertVisible: "Question answered: Maestro"
- tapOn:
    id: "session-back-button"
