appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000

# Navigate to session detail
- tapOn:
    id: "session-card-test-session-1"
- extendedWaitUntil:
    visible:
      id: "session-title"
    timeout: 3000

# Tap title to edit
- tapOn:
    id: "session-title"
- extendedWaitUntil:
    visible: "Rename Session"
    timeout: 3000

# Clear title and save empty string
- clearText
- tapOn: "Save"

# Verify title falls back to "Session"
- extendedWaitUntil:
    visible: "Session"
    timeout: 3000

- tapOn:
    id: "session-back-button"
