appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000
- tapOn:
    id: "session-card-test-session-1"
- assertVisible: "Opus 4.6"
- tapOn:
    id: "input-commands-button"
- extendedWaitUntil:
    visible: "Commands"
    timeout: 3000
- extendedWaitUntil:
    visible: "Change the Claude model for this session"
    timeout: 3000
- tapOn: "Change the Claude model for this session"
- extendedWaitUntil:
    visible: "Select Model"
    timeout: 3000
- tapOn: "Haiku 3.5"
- assertNotVisible: "Select Model"
- assertVisible:
    id: "input-model-badge"
- extendedWaitUntil:
    visible: "Haiku 3.5"
    timeout: 3000
- assertNotVisible: "Opus 4.6"
- tapOn:
    id: "session-back-button"
