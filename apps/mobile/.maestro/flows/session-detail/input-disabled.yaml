appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-2"
    timeout: 5000

# Navigate to ended session (should be disconnected)
- tapOn:
    id: "session-card-test-session-2"
- extendedWaitUntil:
    visible:
      id: "session-status-badge"
    timeout: 3000

# Verify disconnected status
- assertVisible: "Disconnected"

# Verify input shows disconnected placeholder
- assertVisible: "Session disconnected"

- tapOn:
    id: "session-back-button"
