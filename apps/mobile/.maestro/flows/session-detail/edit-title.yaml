appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000

# Navigate to session detail
- tapOn:
    id: "session-card-test-session-1"
- extendedWaitUntil:
    visible:
      id: "session-title"
    timeout: 3000

# Tap title to edit (opens Alert.prompt on iOS)
- tapOn:
    id: "session-title"
- extendedWaitUntil:
    visible: "Rename Session"
    timeout: 3000

# Clear existing text and type new title
- clearText
- inputText: "Renamed Session"
- tapOn: "Save"

# Verify title updated
- extendedWaitUntil:
    visible: "Renamed Session"
    timeout: 3000
- assertVisible: "Renamed Session"

# Go back and verify title persists in session list
- tapOn:
    id: "session-back-button"
- extendedWaitUntil:
    visible: "Renamed Session"
    timeout: 3000
