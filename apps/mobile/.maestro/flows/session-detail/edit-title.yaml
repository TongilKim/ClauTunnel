appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000

# Navigate to session detail
- tapOn:
    id: "session-card-test-session-1"
- extendedWaitUntil:
    visible:
      id: "session-title"
    timeout: 3000

# Open rename modal
- tapOn:
    id: "session-edit-title-button"
- extendedWaitUntil:
    visible:
      id: "rename-session-modal"
    timeout: 3000

# Clear existing text and type new title
- tapOn:
    id: "rename-session-input"
- clearText
- inputText: "Renamed Session"
- tapOn:
    id: "rename-session-save"

# Verify title updated
- extendedWaitUntil:
    visible: "Renamed Session"
    timeout: 3000
- assertVisible: "Renamed Session"

# Go back and verify title persists in session list
- tapOn:
    id: "session-back-button"
- extendedWaitUntil:
    visible: "Renamed Session"
    timeout: 3000
