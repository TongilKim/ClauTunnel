appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "machine-clear-ended-test-machine-1"
    timeout: 5000
- assertVisible: "Ended Session"
- tapOn:
    id: "machine-clear-ended-test-machine-1"
- assertVisible: "Clear Ended Sessions"
- tapOn: "Delete"
- assertNotVisible: "Ended Session"
- assertVisible: "Test Session"
- assertNotVisible:
    id: "machine-clear-ended-test-machine-1"
