appId: com.clautunnel.app
---
- launchApp:
    clearState: true
    arguments:
      EXPO_PUBLIC_E2E_TEST_MODE: "true"
- tapOn:
    id: "session-card-test-session-1"
- assertVisible:
    id: "session-title"
- assertVisible:
    id: "session-status-badge"
- assertVisible:
    id: "terminal-scrollview"
- assertVisible:
    id: "input-text"
- tapOn:
    id: "session-back-button"
- assertVisible: "Test MacBook"
