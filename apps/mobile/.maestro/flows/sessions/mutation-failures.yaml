appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "sessions-stats-total"
    timeout: 5000
- tapOn:
    id: "test-mode-toggle"
- tapOn:
    id: "test-mode-trigger-start-session-error"
- tapOn:
    id: "machine-add-session-test-machine-1"
- extendedWaitUntil:
    visible: "Failed to Start Session"
    timeout: 3000
- tapOn: "OK"
- tapOn:
    id: "session-card-test-session-1"
- extendedWaitUntil:
    visible:
      id: "session-title"
    timeout: 3000
- tapOn:
    id: "test-mode-toggle"
- tapOn:
    id: "test-mode-trigger-title-error"
- tapOn:
    id: "session-edit-title-button"
- extendedWaitUntil:
    visible:
      id: "rename-session-modal"
    timeout: 3000
- tapOn:
    id: "rename-session-input"
- clearText
- inputText: "Broken Rename"
- tapOn:
    id: "rename-session-save"
- extendedWaitUntil:
    visible: "Session Error"
    timeout: 3000
- assertVisible: "Mock title update failure from test mode"
- tapOn: "OK"
- tapOn:
    id: "rename-session-cancel"
