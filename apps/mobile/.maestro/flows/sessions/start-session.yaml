appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "machine-add-session-test-machine-1"
    timeout: 5000
- tapOn:
    id: "machine-add-session-test-machine-1"
- extendedWaitUntil:
    visible:
      id: "session-title"
    timeout: 3000
- assertVisible: "Test Session 3"
- tapOn:
    id: "session-back-button"
- assertVisible:
    id: "session-card-test-session-3"
- assertVisible: "Test Session 3"
