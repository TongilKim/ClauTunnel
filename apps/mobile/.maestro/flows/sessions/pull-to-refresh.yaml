appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000

# Verify initial state
- assertVisible: "Test Session"
- assertVisible:
    id: "sessions-stats-total"

# Tap refresh button
- tapOn:
    id: "sessions-refresh-button"

# Verify sessions are still visible after refresh
- extendedWaitUntil:
    visible:
      id: "session-card-test-session-1"
    timeout: 5000
- assertVisible: "Test Session"
