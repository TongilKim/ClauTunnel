appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "sessions-stats-total"
    timeout: 5000
- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    visible:
      id: "settings-logout-button"
    timeout: 5000
- tapOn:
    id: "settings-logout-button"
- assertVisible: "Sign Out"
- tapOn: "Cancel"
- assertVisible:
    id: "settings-logout-button"
- assertVisible:
    id: "settings-email"
