appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "sessions-stats-total"
    timeout: 5000
- tapOn:
    point: "75%,93%"
- extendedWaitUntil:
    visible:
      id: "settings-logout-button"
    timeout: 5000
- tapOn:
    id: "settings-logout-button"
- assertVisible: "Disconnect"
- tapOn: "Cancel"
- assertVisible:
    id: "settings-logout-button"
- assertVisible:
    id: "settings-email"
