appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "sessions-stats-total"
    timeout: 5000
- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    visible:
      id: "settings-email"
    timeout: 5000
- assertVisible: "Account"
- assertVisible:
    id: "settings-email"
- assertVisible: "test@clautunnel.com"
- assertVisible: "About"
- assertVisible:
    id: "settings-version"
