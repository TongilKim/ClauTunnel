appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-signup-link"
- extendedWaitUntil:
    visible:
      id: "register-button"
    timeout: 3000
- assertVisible: "Create Account"
- tapOn:
    id: "register-login-link"
- extendedWaitUntil:
    visible:
      id: "login-button"
    timeout: 3000
- assertVisible: "ClauTunnel"
