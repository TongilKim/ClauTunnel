appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "bad@example.com"
- tapOn:
    id: "login-password-input"
- inputText: "wrongpassword"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "login-error-text"
    timeout: 3000
- assertVisible: "Invalid email or password"
- tapOn: "Dismiss"
- assertNotVisible:
    id: "login-error-text"
- assertVisible:
    id: "login-button"
