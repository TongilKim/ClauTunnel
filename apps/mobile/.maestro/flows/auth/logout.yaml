appId: com.clautunnel.app
---
- launchApp:
    clearState: true
# Test mode auto-pairs — wait for session list
- extendedWaitUntil:
    visible:
      id: "sessions-stats-total"
    timeout: 15000
# Navigate to settings
- tapOn:
    point: "75%,93%"
- extendedWaitUntil:
    visible:
      id: "settings-logout-button"
    timeout: 5000
- assertVisible:
    id: "settings-logout-button"
- tapOn:
    id: "settings-logout-button"
- tapOn: "Disconnect"
# After logout, should land on pair screen
- extendedWaitUntil:
    visible:
      id: "pair-screen"
    timeout: 5000
- assertVisible: "ClauTunnel"
