appId: com.clautunnel.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-email-input"
- inputText: "test@clautunnel.com"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "sessions-stats-total"
    timeout: 5000
- tapOn:
    point: "75%,93%"
- extendedWaitUntil:
    visible:
      id: "settings-logout-button"
    timeout: 5000
- assertVisible:
    id: "settings-logout-button"
- tapOn:
    id: "settings-logout-button"
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 5000
- assertVisible: "ClauTunnel"
