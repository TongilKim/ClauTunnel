appId: com.clautunnel.app
---
- launchApp:
    clearState: true

# Take debug screenshot to see initial state
- takeScreenshot: app-launched

# Session list — wait for mock data to render
- extendedWaitUntil:
    visible:
      id: "sessions-stats-total"
    timeout: 15000
- assertVisible:
    id: "machine-section-test-machine-1"
- assertVisible:
    id: "session-card-test-session-1"

# Navigate to session detail
- tapOn:
    id: "session-card-test-session-1"
- assertVisible:
    id: "session-title"
- assertVisible:
    id: "terminal-scrollview"
- assertVisible:
    id: "input-text"

# Send a message
- tapOn:
    id: "input-text"
- inputText: "Hello from smoke test"
- tapOn:
    id: "input-send-button"

# Test AskUserQuestion flow
- tapOn:
    id: "test-mode-toggle"
- tapOn:
    id: "test-mode-trigger-question"
- assertVisible:
    id: "user-question-modal"
- assertVisible:
    id: "user-question-title"
- tapOn:
    id: "user-question-option-0-0"
- tapOn:
    id: "user-question-submit"
- assertNotVisible:
    id: "user-question-modal"

# Test Permission Request flow
- tapOn:
    id: "test-mode-trigger-permission"
- assertVisible:
    id: "permission-request-modal"
- tapOn:
    id: "permission-allow-button"
- assertNotVisible:
    id: "permission-request-modal"

# Close test mode panel
- tapOn:
    id: "test-mode-toggle"

# Go back to session list
- tapOn:
    id: "session-back-button"
- assertVisible:
    id: "machine-section-test-machine-1"

# Navigate to settings
- tapOn: "Settings"
- assertVisible:
    id: "settings-email"
- assertVisible:
    id: "settings-version"
